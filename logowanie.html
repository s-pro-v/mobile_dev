<!DOCTYPE html>
<html lang="pl" theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg' fill='none' stroke-linecap='square' stroke-linejoin='miter'%3E%3Cpolygon points='35,15 85,15 85,105 35,105' stroke='%23292929' stroke-width='6'/%3E%3Cpolygon points='45,30 75,30 75,70 45,70' stroke='%23949494' stroke-width='4'/%3E%3Crect x='50' y='40' width='6' height='6' fill='%23f39a2b' stroke='none'/%3E%3Crect x='64' y='40' width='6' height='6' fill='%23f39a2b' stroke='none'/%3E%3Crect x='50' y='54' width='6' height='6' fill='%23dbdbdb' stroke='none'/%3E%3Crect x='64' y='54' width='6' height='6' fill='%23f39a2b' stroke='none'/%3E%3Crect x='55' y='85' width='10' height='10' stroke='%23292929' stroke-width='4'/%3E%3Cpolyline points='20,40 10,50 20,60' stroke='%23f39a2b' stroke-width='4'/%3E%3Cpolyline points='100,40 110,50 100,60' stroke='%23f39a2b' stroke-width='4'/%3E%3Cpolyline points='25,30 15,50 25,70' stroke='%23949494' stroke-width='2'/%3E%3Cpolyline points='95,30 105,50 95,70' stroke='%23949494' stroke-width='2'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>SYS.AUTH // Push Approval Protocol</title>
    <link rel="stylesheet" href="css/logowanie.css">
</head>

<body>

    <div class="sys-terminal">
        <header>
            <span class="sys-id">SEC_MODULE // AUTO_PUSH_AUTH</span>
            <button id="theme-btn"><i class="fas fa-moon"></i></button>
        </header>

        <!-- KROK 1: LOGIN -->
        <main class="auth-core" id="step-1">
            <h1>Identyfikacja L1</h1>
            <p>Wprowadź Name i klucz globalny. Wymagana autoryzacja PUSH.</p>
            <input type="text" id="sys-user" class="credential-input" placeholder="NAME (GitHub)" autocomplete="off">
            <input type="password" id="sys-pass" class="credential-input" placeholder="HASŁO GLOBALNE">
            <button class="trigger-btn" id="login-trigger" disabled>
                <i class="fas fa-right-to-bracket"></i> Inicjalizacja...
            </button>
            <div class="aux-links">
                <a href="admin.html" id="link-admin-panel" class="hidden-step"><i class="fas fa-user-shield"></i> Admin Panel</a>
            </div>
        </main>

        <!-- KROK 2: WAIT -->
        <main class="auth-core hidden-step" id="step-2">
            <h1>Autoryzacja PUSH</h1>
            <p>Węzeł: <span id="current-user-display" style="color: var(--highlight-color);"></span></p>

            <div class="token-matrix" id="token-container">
                <input type="text" class="crypt-input" readonly maxlength="1">
                <input type="text" class="crypt-input" readonly maxlength="1">
                <input type="text" class="crypt-input" readonly maxlength="1">
                <input type="text" class="crypt-input" readonly maxlength="1">
                <input type="text" class="crypt-input" readonly maxlength="1">
                <input type="text" class="crypt-input" readonly maxlength="1">
            </div>

            <button class="trigger-btn" id="auth-trigger" disabled>
                <span class="loader"></span> <span>Oczekiwanie na sygnał...</span>
            </button>

            <div class="aux-links">
                <a href="#" id="cancel-trigger"><i class="fas fa-xmark"></i> Przerwij żądanie</a>
            </div>
        </main>

        <div class="status-console" id="status-log">[SYSTEM] Booting...</div>
    </div>

    <script>
        /** KONFIGURACJA GITHUB */
        const REPO_OWNER = 's-pro-v';
        const REPO_NAME = 'json-lista';
        const STATE_FILE = 'dev/sys_state.json';
        const CREDENTIALS_FILE = 'dev/key_f2a.json';
        const AUTH_JSON_URL = 'https://raw.githubusercontent.com/s-pro-v/json-lista/refs/heads/main/dev/auth.json';
        const XOR_KEY = atob('dzVn'); 
        
        const ADMIN_NAME = atob('Um9iZXJ0cw=='); // Roberts
        const ADMIN_PASS = atob('YWRtaW4yNg=='); // admin26
        const GLOBAL_PASS = atob('c3RhcnQyNg=='); // start26

        let GITHUB_PAT = null;
        let ACTIVE_USER_DATA = null;
        let POLLING_TIMER = null;
        let IDENTITY_MATRIX = {};

        const DOM = {
            step1: document.getElementById('step-1'),
            step2: document.getElementById('step-2'),
            userIn: document.getElementById('sys-user'),
            passIn: document.getElementById('sys-pass'),
            loginBtn: document.getElementById('login-trigger'),
            authBtn: document.getElementById('auth-trigger'),
            userDisp: document.getElementById('current-user-display'),
            status: document.getElementById('status-log'),
            themeBtn: document.getElementById('theme-btn'),
            cancelBtn: document.getElementById('cancel-trigger'),
            inputs2fa: document.querySelectorAll('.crypt-input'),
            adminLink: document.getElementById('link-admin-panel')
        };

        function updateLog(msg, state = 'default') {
            DOM.status.textContent = msg;
            DOM.status.className = 'status-console';
            if(state !== 'default') DOM.status.classList.add(`state-${state}`);
        }

        /** DEKODOWANIE PAT */
        function xorDecode(base64, key) {
            const binary = atob(base64);
            let out = '';
            for (let i = 0; i < binary.length; i++) {
                out += String.fromCharCode(binary.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return out;
        }

        async function loadPat() {
            try {
                const stored = localStorage.getItem('sys_auth_github_pat');
                if (stored) { GITHUB_PAT = stored; return; }

                const res = await fetch(`${AUTH_JSON_URL}?t=${Date.now()}`);
                const data = await res.json();
                const enc = (Array.isArray(data) ? data[0] : data).sys_pat;
                GITHUB_PAT = xorDecode(enc, XOR_KEY);
            } catch (e) {
                updateLog('Błąd krytyczny: Brak klucza API.', 'error');
            }
        }

        /** GITHUB API */
        async function ghGet(path) {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?t=${Date.now()}`, {
                headers: { 'Authorization': `token ${GITHUB_PAT}` }
            });
            if (!res.ok) return { sha: null, data: {} };
            const file = await res.json();
            return { sha: file.sha, data: JSON.parse(decodeURIComponent(escape(atob(file.content)))) };
        }

        async function ghPut(path, data, sha, msg) {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB_PAT}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))), sha })
            });
            return res.ok;
        }

        /** LOGIKA AUTORYZACJI */
        async function init() {
            await loadPat();
            const { data } = await ghGet(CREDENTIALS_FILE);
            if (data.workers) {
                data.workers.forEach(w => {
                    const nameLower = w.name.toLowerCase();
                    const isAllowed = w.shifts[1] === "TRUE" || w.shifts[1] === true || nameLower === ADMIN_NAME.toLowerCase();
                    if (isAllowed) {
                        IDENTITY_MATRIX[nameLower] = {
                            name: w.name,
                            token: String(w.shifts[2]).replace(/\D/g, '').slice(0, 6),
                            skip2fa: w.shifts[3] === "TRUE" || w.shifts[3] === true || nameLower === ADMIN_NAME.toLowerCase()
                        };
                    }
                });
                DOM.loginBtn.disabled = false;
                DOM.loginBtn.innerHTML = '<i class="fas fa-right-to-bracket"></i> Inicjuj sesję';
                updateLog('[SYSTEM] Protokół gotowy do uwierzytelnienia.');
            }
        }

        async function handleLogin() {
            const user = DOM.userIn.value.trim().toLowerCase();
            const pass = DOM.passIn.value.trim();
            const node = IDENTITY_MATRIX[user];

            if (!node) { updateLog('[ODMOWA] Nieprawidłowy identyfikator.', 'error'); return; }
            
            const isAdm = user === ADMIN_NAME.toLowerCase();
            if ((isAdm && pass !== ADMIN_PASS) || (!isAdm && pass !== GLOBAL_PASS)) {
                updateLog('[ODMOWA] Błędny klucz dostępu.', 'error'); return;
            }

            DOM.loginBtn.disabled = true;
            updateLog('[SYSTEM] Weryfikacja węzła...', 'warning');

            try {
                const { data, sha } = await ghGet(STATE_FILE);
                
                // Jeśli skip 2FA (np. Roberts)
                if (node.skip2fa) {
                    data.active_sessions[user] = { original_name: node.name, last_active: Date.now() };
                    await ghPut(STATE_FILE, data, sha, `AUTH: ${node.name} (Direct)`);
                    saveAndRedirect(node.name);
                    return;
                }

                // Standardowy PUSH
                data.pending_2fa[user] = {
                    time: Date.now(),
                    token: node.token,
                    device: navigator.userAgent.slice(0, 50)
                };
                await ghPut(STATE_FILE, data, sha, `PUSH_REQ: ${node.name}`);
                
                ACTIVE_USER_DATA = node;
                DOM.step1.classList.add('hidden-step');
                DOM.step2.classList.remove('hidden-step');
                DOM.userDisp.textContent = node.name;
                startPolling();
            } catch (e) {
                updateLog('Błąd połączenia z bazą.', 'error');
                DOM.loginBtn.disabled = false;
            }
        }

        function startPolling() {
            updateLog('[WAIT] Oczekiwanie na zatwierdzenie administratora...', 'warning');
            const key = ACTIVE_USER_DATA.name.toLowerCase();
            
            POLLING_TIMER = setInterval(async () => {
                const { data } = await ghGet(STATE_FILE);
                const perm = data.access_permissions?.[key];

                if (perm === 'GRANTED') {
                    clearInterval(POLLING_TIMER);
                    updateLog('[OK] Dostęp przyznany. Synchronizacja...', 'success');
                    await autoTypeAndFinalize();
                } else if (perm === 'DENIED') {
                    clearInterval(POLLING_TIMER);
                    updateLog('[ALERT] Żądanie odrzucone przez administratora.', 'error');
                    setTimeout(() => location.reload(), 3000);
                }
            }, 4000);
        }

        async function autoTypeAndFinalize() {
            const chars = ACTIVE_USER_DATA.token.split('');
            for (let i = 0; i < 6; i++) {
                DOM.inputs2fa[i].value = chars[i];
                DOM.inputs2fa[i].style.borderColor = 'var(--highlight-color)';
                await new Promise(r => setTimeout(r, 100));
            }
            
            // Finalizacja na GitHubie
            const { data, sha } = await ghGet(STATE_FILE);
            const key = ACTIVE_USER_DATA.name.toLowerCase();
            
            if (data.access_permissions) delete data.access_permissions[key];
            if (data.pending_2fa) delete data.pending_2fa[key];
            
            data.active_sessions[key] = { original_name: ACTIVE_USER_DATA.name, last_active: Date.now() };
            
            const success = await ghPut(STATE_FILE, data, sha, `AUTH_SUCCESS: ${ACTIVE_USER_DATA.name}`);
            if (success) saveAndRedirect(ACTIVE_USER_DATA.name);
        }

        function saveAndRedirect(name) {
            localStorage.setItem('sys_auth_2fa_mobile', name);
            localStorage.setItem('sys_auth_login_time', Date.now());
            updateLog('Sesja ustanowiona. Przekierowanie...', 'success');
            setTimeout(() => {
                window.location.href = 'mobile/index.html';
            }, 1000);
        }

        /** UI & THEME */
        DOM.themeBtn.onclick = () => {
            const current = document.documentElement.getAttribute('theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('theme', next);
            localStorage.setItem('sys_auth_theme', next);
            DOM.themeBtn.innerHTML = next === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        };

        DOM.userIn.oninput = () => {
            if (DOM.userIn.value.toLowerCase() === ADMIN_NAME.toLowerCase()) {
                DOM.adminLink.classList.remove('hidden-step');
            } else {
                DOM.adminLink.classList.add('hidden-step');
            }
        };

        DOM.cancelBtn.onclick = (e) => {
            e.preventDefault();
            location.reload();
        };

        DOM.loginBtn.onclick = handleLogin;

        // Auto-login check
        (function checkExisting() {
            const user = localStorage.getItem('sys_auth_2fa_mobile');
            const time = localStorage.getItem('sys_auth_login_time');
            if (user && time && (Date.now() - time < 300000)) { // 5 min
                window.location.replace("mobile/index.html");
            }
        })();

        init();
    </script>
</body>
</html>
