<!DOCTYPE html>
<html lang="pl" theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Info · OBSADA</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous">
    <link rel="stylesheet" href="../css/mobile.css">
</head>

<body id="app-body" class="info-page">
    <div class="container info-container">
        <header class="info-header">
            <a href="index.html" class="nav-btn log" title="Odśwież" aria-label="Odśwież stronę"
                onclick="window.location.reload();"><i class="fas fa-arrow-rotate-right"></i></a>
            <h1 class="info-title">Informacje</h1>
            <a href="../index.html" class="nav-btn log" title="Więcej" aria-label="Więcej"><i
                    class="fas fa-ellipsis-h"></i></a>
        </header>

        <main class="info-main">
            <section class="info-card info-card-update">
                <div class="info-card-icon">
                    <i class="fas fa-sync-alt" aria-hidden="true"></i>
                </div>
                <h2 class="info-card-title">Aktualizacja</h2>
                <p class="info-card-desc">Trwają prace aktualizacyjne. Nowe funkcje i poprawki będą dostępne wkrótce.
                </p>
            </section>

            <section class="info-card info-card-unavailable">
                <div class="info-card-icon">
                    <i class="fas fa-clock" aria-hidden="true"></i>
                </div>
                <h2 class="info-card-title">Dostęp tymczasowo niedostępny</h2>
                <p class="info-card-desc">Panel jest chwilowo niedostępny. Spróbuj ponownie za kilka minut lub
                    skontaktuj się z administratorem.</p>
            </section>

            <p class="info-footer">OBSADA ZMIANY · Panel mobilny</p>
        </main>
    </div>

    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('theme', theme);
        })();
    </script>
</body>

</html>
